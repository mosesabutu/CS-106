<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fashion Showcase | OVERLOOK</title>
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="../header.js"></script>
    <link
      rel="icon"
      type="image/png"
      href="../src/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="../src/favicon.svg" />
    <link rel="shortcut icon" href="../src/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../src/apple-touch-icon.png"
    />
    <meta name="apple-mobile-web-app-title" content="CS-106" />
    <link rel="manifest" href="../src/site.webmanifest" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </head>
  <body>
    <div class="hompage-marquee">
      <marquee scrollamount="10">
        Upcoming Event: Woven Threads - June 15 - 10pm | Contact Us For
        Appointment!
      </marquee>
    </div>
    <header-main></header-main>

    <header class="ctr">
      <h1>OUR COLLECTIONS</h1>
    </header>

    <div class="category-filters">
      <button onclick="filterProducts('all')" class="filter-btn active al">
        ALL PRODUCTS
      </button>
      <button onclick="filterProducts('all')" class="filter-btn active al">
        ALL PRODUCTS
      </button>
      <button onclick="filterProducts('Clothes')" class="filter-btn">
        CLOTHES
      </button>
      <button onclick="filterProducts('Shoes')" class="filter-btn">
        SHOES
      </button>
      <button onclick="filterProducts('Handbags')" class="filter-btn">
        HANDBAGS
      </button>
      <button onclick="filterProducts('Jewelry')" class="filter-btn">
        JEWELRY
      </button>
    </div>

    <dialog id="cart-drawer" class="drawer">
      <div class="cart-header">
        <h3>
          <span
            ><svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              fill="currentColor"
              class="bi bi-check-lg"
              viewBox="0 0 16 16"
            >
              <path
                d="M12.736 3.97a.733.733 0 0 1 1.047 0c.286.289.29.756.01 1.05L7.88 12.01a.733.733 0 0 1-1.065.02L3.217 8.384a.757.757 0 0 1 0-1.06.733.733 0 0 1 1.047 0l3.052 3.093 5.4-6.425z"
              /></svg></span
          >ADDED TO CART
        </h3>
        <button id="closeCart">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            fill="currentColor"
            class="bi bi-x"
            viewBox="0 0 16 16"
          >
            <path
              d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708"
            />
          </svg>
        </button>
      </div>
      <div id="cartContainer" class="cartContainer"></div>
      <a href="../cart/index.html">GO TO CART</a>
    </dialog>

    <main id="product-grid" class="product-grid"></main>
    <footer-main></footer-main>

    <script src="script.js" type="module"></script>
  </body>
</html>
