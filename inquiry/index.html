<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talk to Us</title>
    <script type="module" src="../header.js"></script>
    <link
      rel="icon"
      type="image/png"
      href="../src/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="../src/favicon.svg" />
    <link rel="shortcut icon" href="../src/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../src/apple-touch-icon.png"
    />
    <meta name="apple-mobile-web-app-title" content="CS-106" />
    <link rel="manifest" href="../src/site.webmanifest" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </head>

  <body>
    <div class="hompage-marquee">
      <marquee scrollamount="10">
        Upcoming Event: Woven Threads - June 15 - 10pm | Contact Us For
        Appointment!
      </marquee>
    </div>
    <header-main></header-main>
    <section>
      <img src="target-audience-for-luxury-brand.jpg" alt="" />

      <div class="container">
        <div class="header">
          <h1>GET IN TOUCH</h1>
          <p>We’d Love to Hear From You...</p>
        </div>

        <div class="content">
          <div class="form-section">
            <form id="contactForm">
              <div class="form-group">
                <label>Name</label>
                <div class="input-wrapper">
                  <i class="fa fa-user"></i>
                  <input type="text" id="name" />
                </div>
              </div>

              <div class="form-group">
                <label>Email</label>
                <div class="input-wrapper">
                  <i class="fa fa-envelope"></i>
                  <input type="email" id="email" />
                </div>
              </div>

              <div class="form-group">
                <label>Message</label>
                <div class="input-wrapper">
                  <i class="fa fa-comment"></i>
                  <textarea id="message"></textarea>
                </div>
              </div>

              <button type="submit">SEND MESSAGE</button>
            </form>
          </div>

          <!-- INFO -->
          <div class="info-section">
            <h2>Visit Us</h2>

            <div class="info-item">
              <i class="fa fa-location-dot"></i>
              <div>
                Miva Open University, 376 Herbert Macaulay Wy,<br />
                Lagos Mainland,
              </div>
            </div>

            <div class="info-item">
              <i class="fa fa-envelope"></i>
              <div>info@overlook.com</div>
            </div>

            <div class="info-item">
              <i class="fa fa-phone"></i>
              <div>0700 044 4000</div>
            </div>

            <div class="info-item">
              <i class="fa fa-building"></i>
              <div>
                Lagos<br />
                Nigeria
              </div>
            </div>

            <div class="socials">
              <i class="fab fa-facebook-f"></i>
              <i class="fab fa-linkedin-in"></i>
              <i class="fab fa-twitter"></i>
              <i class="fa fa-envelope"></i>
            </div>
          </div>
        </div>
      </div>
    </section>
    <footer-main></footer-main>
    <script>
      document
        .getElementById("contactForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          let name = document.getElementById("name").value.trim();
          let email = document.getElementById("email").value.trim();
          let message = document.getElementById("message").value.trim();

          if (!name || !email || !message) {
            alert("All fields are required.");
            return;
          }

          alert("Message sent successfully!");
          this.reset();
        });
    </script>
  </body>
</html>
